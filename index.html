<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘芮辰 - 个人简历</title>
<style>
  :root { --blue: #2563eb; --gray: #6b7280; --light: #f8fafc; --border: #e5e7eb; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f1f5f9; color: #1e293b; line-height: 1.6; }
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }

  /* 头部 */
  .header { background: linear-gradient(135deg, #1e40af, #3b82f6); color: #fff; padding: 32px 36px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .header .name { font-size: 2rem; font-weight: 700; }
  .header .title { font-size: .95rem; opacity: .85; margin-top: 4px; }
  .header .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .header .tag { background: rgba(255,255,255,.15); padding: 4px 14px; border-radius: 20px; font-size: .85rem; }

  /* 区块 */
  .section { padding: 28px 36px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section h2 { font-size: 1.15rem; color: var(--blue); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section h2 .icon { font-size: 1.3rem; }

  /* 时间线 */
  .item { padding-left: 18px; border-left: 2px solid #dbeafe; margin-bottom: 20px; }
  .item:last-child { margin-bottom: 0; }
  .item .head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .item .head h3 { font-size: 1.05rem; font-weight: 600; }
  .item .head .date { font-size: .82rem; color: var(--blue); background: #eff6ff; padding: 2px 10px; border-radius: 12px; white-space: nowrap; }
  .item .sub { font-size: .9rem; color: var(--gray); margin-bottom: 6px; }
  .item li { font-size: .92rem; color: #475569; margin-bottom: 4px; list-style: none; }
  .item li::before { content: "•"; color: #93c5fd; margin-right: 8px; }

  /* 技能 */
  .skills { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .skill-box { background: var(--light); border-radius: 12px; padding: 16px; }
  .skill-box h4 { font-size: .92rem; font-weight: 600; margin-bottom: 8px; }
  .skill-box .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-box .tag-list span { background: #fff; border: 1px solid var(--border); padding: 3px 10px; border-radius: 14px; font-size: .82rem; color: #475569; }

  /* 自我评价 */
  .eval-item { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
  .eval-item .num { background: #dbeafe; color: var(--blue); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 700; flex-shrink: 0; }
  .eval-item p { font-size: .92rem; color: #475569; }

  .loading { text-align: center; padding: 80px 0; color: var(--gray); }
  .footer { text-align: center; padding: 16px; font-size: .8rem; color: #94a3b8; }

  @media (max-width: 600px) {
    .header { padding: 24px 20px; }
    .header .name { font-size: 1.5rem; }
    .section { padding: 20px; }
    .skills { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div id="loading" class="loading">简历加载中...</div>
    <div id="content" style="display:none"></div>
  </div>
  <div class="footer">© 2025 刘芮辰 | 感谢阅读</div>
</div>

<script>
(async () => {
  try {
    // 加载简历数据
    const data = await (await fetch('resume-data.json')).json();
    const p = data.personal;

    document.getElementById('content').innerHTML = `
      <div class="header">
        <div>
          <div class="name">${p.name}</div>
          <div class="title">意向岗位：${(p.targetPositions||[]).join(' / ')}</div>
          <div class="tags">
            ${[p.phone,p.email,p.hometown,p.age+'岁',p.politicalStatus].filter(Boolean).map(v=>`<span class="tag">${v}</span>`).join('')}
          </div>
        </div>
      </div>

      <div class="section">
        <h2><span class="icon">🎓</span>教育背景</h2>
        ${(data.education||[]).map(e=>`
          <div class="item">
            <div class="head"><h3>${e.school}</h3><span class="date">${e.period}</span></div>
            <div class="sub">${e.major}</div>
            ${(e.details||[]).map(d=>`<li>${d}</li>`).join('')}
          </div>
        `).join('')}
      </div>

      <div class="section">
        <h2><span class="icon">💼</span>实习经历</h2>
        ${(data.internships||[]).map(i=>`
          <div class="item">
            <div class="head"><h3>${i.company}</h3><span class="date">${i.period}</span></div>
            <div class="sub">${i.position}</div>
            ${(i.details||[]).map(d=>`<li>${d}</li>`).join('')}
          </div>
        `).join('')}
      </div>

      <div class="section">
        <h2><span class="icon">🏫</span>校园经历</h2>
        ${(data.campus||[]).map(c=>`
          <div class="item">
            <div class="head"><h3>${c.organization}</h3><span class="date">${c.period}</span></div>
            <div class="sub">${c.role}</div>
            ${(c.details||[]).map(d=>`<li>${d}</li>`).join('')}
          </div>
        `).join('')}
      </div>

      <div class="section">
        <h2><span class="icon">⭐</span>技能特长</h2>
        <div class="skills">
          ${(data.skills||[]).map(s=>`
            <div class="skill-box">
              <h4>${s.category}</h4>
              <div class="tag-list">${(s.items||[]).map(i=>`<span>${i}</span>`).join('')}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <h2><span class="icon">💡</span>自我评价</h2>
        ${(data.selfEvaluation||[]).map((t,i)=>`
          <div class="eval-item"><span class="num">${i+1}</span><p>${t}</p></div>
        `).join('')}
      </div>
    `;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').textContent = '加载失败，请刷新重试';
  }
})();
</script>
</body>
</html>
