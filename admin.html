<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理登录 - 简历后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4">
  <div class="w-full max-w-sm">
    <!-- 登录卡片 -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <div class="text-4xl mb-3">🔐</div>
        <h1 class="text-xl font-bold text-gray-800">简历管理后台</h1>
        <p class="text-gray-400 text-sm mt-1">请输入管理密码以继续</p>
      </div>

      <!-- 密码输入 -->
      <div class="space-y-4">
        <div>
          <input
            id="password-input"
            type="password"
            placeholder="请输入管理密码"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-center"
            autofocus
          >
        </div>
        <button
          id="login-btn"
          class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-medium hover:from-blue-700 hover:to-indigo-700 transition shadow-lg shadow-blue-200"
        >
          登 录
        </button>
      </div>

      <!-- 错误提示 -->
      <div id="error-msg" class="mt-4 text-center text-red-500 text-sm hidden"></div>
    </div>

    <!-- 返回链接 -->
    <div class="text-center mt-4">
      <a href="/" class="text-white/70 hover:text-white text-sm transition">← 返回简历主页</a>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    /**
     * 尝试登录
     * 将密码发送到后端 API 验证，成功后保存 token 并跳转
     */
    async function login() {
      const password = passwordInput.value.trim();
      if (!password) {
        showError('请输入密码');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '验证中...';
      errorMsg.classList.add('hidden');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        const result = await response.json();

        if (result.success) {
          // 登录成功，保存 token 到 sessionStorage（关闭浏览器后自动清除）
          sessionStorage.setItem('admin_token', result.token);
          window.location.href = '/admin-app.html';
        } else {
          showError('密码错误，请重试');
        }
      } catch (e) {
        showError('网络错误，请稍后重试');
        console.error('登录请求失败:', e);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    // 绑定事件：点击登录按钮
    loginBtn.addEventListener('click', login);

    // 绑定事件：按回车键登录
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
